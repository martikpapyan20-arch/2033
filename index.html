<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2033 Mods</title>

<style>

:root{
--bg:#050506;
--card:#0b0b0f;
--line:rgba(255,255,255,.12);
--text:rgba(255,255,255,.9);
--muted:rgba(255,255,255,.6);
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{
background:radial-gradient(1200px 700px at 50% 10%,#101117 0%,#050506 60%,#000 100%);
color:var(--text);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

/* дым */

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* центр */

.center{
text-align:center;
z-index:2;
position:relative;
}

/* логотип */

.logo{
width:420px;
cursor:pointer;
filter:drop-shadow(0 0 25px rgba(255,255,255,.25));
animation:float 6s ease-in-out infinite;
transition:.4s;
}

.logo:hover{
transform:scale(1.06);
filter:drop-shadow(0 0 50px rgba(255,255,255,.5));
}

.tagline{
margin-top:20px;
letter-spacing:4px;
color:var(--muted);
}

/* карточки */

.cards{
position:absolute;
top:55%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
gap:40px;
opacity:0;
pointer-events:none;
transition:1s;
}

.cards.show{
opacity:1;
pointer-events:auto;
}

.card{
width:280px;
padding:30px;
background:var(--card);
border:1px solid var(--line);
text-align:center;
transition:.4s;
}

.card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 50px rgba(255,255,255,.06);
}

.name{
font-size:20px;
letter-spacing:2px;
margin-bottom:15px;
}

.price{
margin:6px 0;
color:var(--muted);
}

/* кнопки */

.links{
margin-top:15px;
display:flex;
flex-direction:column;
gap:8px;
}

.links a{
border:1px solid var(--line);
padding:8px;
color:white;
text-decoration:none;
font-size:13px;
transition:.3s;
}

.links a:hover{
background:white;
color:black;
}

/* анимация */

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}

</style>
</head>

<body>

<canvas id="smoke"></canvas>

<div class="center">

<img src="./assets/logo2.png" class="logo" id="logo">

<div class="tagline">
REDUX • GUN PACKS • GTA 5 RP
</div>

</div>

<div class="cards" id="cards">

<div class="card">

<div class="name">.CHKMNP</div>

<div class="price">Gun Pack — 1500₽+</div>
<div class="price">Redux — 1000₽+</div>

<div class="links">
<a href="https://www.youtube.com/@chkmnpys" target="_blank">YouTube</a>
<a href="https://t.me/yagichmods" target="_blank">Telegram</a>
<a href="https://discord.gg/UBzjrRff" target="_blank">Discord</a>
</div>

</div>

<div class="card">

<div class="name">NBAHONE</div>

<div class="price">Gun Pack — 1500₽+</div>
<div class="price">Redux — 1000₽+</div>

<div class="links">
<a href="https://www.youtube.com/@nbahone5rp" target="_blank">YouTube</a>
<a href="https://t.me/yagichmods" target="_blank">Telegram</a>
<a href="https://discord.gg/UBzjrRff" target="_blank">Discord</a>
</div>

</div>

</div>

<script>

/* логотип → открыть карточки */

document.getElementById("logo").onclick=()=>{
document.getElementById("cards").classList.toggle("show")
}

/* дым */

const canvas=document.getElementById("smoke");
const ctx=canvas.getContext("2d");

let w=canvas.width=window.innerWidth;
let h=canvas.height=window.innerHeight;

let p=[];

for(let i=0;i<150;i++){

p.push({
x:Math.random()*w,
y:Math.random()*h,
r:Math.random()*2+1,
v:Math.random()*0.4+0.1
})

}

function draw(){

ctx.clearRect(0,0,w,h)

p.forEach(e=>{

e.y-=e.v

if(e.y<0){
e.y=h
e.x=Math.random()*w
}

ctx.beginPath()
ctx.arc(e.x,e.y,e.r,0,Math.PI*2)
ctx.fillStyle="rgba(255,255,255,.05)"
ctx.fill()

})

requestAnimationFrame(draw)

}

draw()

window.onresize=()=>{
w=canvas.width=window.innerWidth
h=canvas.height=window.innerHeight
}

</script>

</body>
</html>
