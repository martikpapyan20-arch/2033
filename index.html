<!DOCTYPE html>

<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2033 Mods</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ===============================
   GLOBAL
================================ */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:#050506;
color:white;
font-family:'Cinzel',serif;
overflow-x:hidden;
}

/* ===============================
   SMOKE BACKGROUND
================================ */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 30%,rgba(255,255,255,.08),transparent 40%),
radial-gradient(circle at 70% 60%,rgba(255,255,255,.06),transparent 45%),
radial-gradient(circle at 40% 80%,rgba(255,255,255,.05),transparent 40%);
animation:smokeMove 20s infinite linear;
z-index:-1;
}

@keyframes smokeMove{
0%{transform:translateY(0)}
50%{transform:translateY(-60px)}
100%{transform:translateY(0)}
}

/* ===============================
   HERO
================================ */

.hero{
text-align:center;
padding-top:120px;
padding-bottom:120px;
}

.logo{
width:420px;
max-width:90%;
display:block;
margin:auto;
cursor:pointer;
filter:drop-shadow(0 0 35px rgba(255,255,255,.35));
animation:logoFloat 6s ease-in-out infinite;
}

@keyframes logoFloat{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

.tagline{
margin-top:40px;
font-size:20px;
letter-spacing:4px;
opacity:.9;
}

.hint{
margin-top:10px;
font-size:14px;
opacity:.6;
}

/* ===============================
   SECTION TITLE
================================ */

.section-title{
text-align:center;
margin:80px 0 40px;
font-size:20px;
letter-spacing:6px;
}

/* ===============================
   GRID
================================ */

.grid{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
padding:0 20px 100px;
}

/* ===============================
   CARD
================================ */

.card{
background:rgba(0,0,0,.35);
border:1px solid rgba(255,255,255,.15);
padding:25px;
backdrop-filter:blur(6px);
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:rgba(255,255,255,.35);
}

/* ===============================
   CREATOR INFO
================================ */

.creator-head{
display:flex;
align-items:center;
gap:15px;
margin-bottom:15px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
border:1px solid rgba(255,255,255,.4);
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

.name{
font-size:18px;
letter-spacing:2px;
}

.role{
font-size:12px;
opacity:.6;
}

/* ===============================
   PRICES
================================ */

.prices{
border:1px solid rgba(255,255,255,.25);
padding:12px 15px;
margin-bottom:20px;
display:flex;
justify-content:space-between;
font-size:14px;
}

/* ===============================
   BUTTONS
================================ */

.buttons{
display:flex;
gap:10px;
margin-bottom:20px;
}

.buttons a{
flex:1;
text-align:center;
padding:10px;
border:1px solid rgba(255,255,255,.3);
text-decoration:none;
color:white;
font-size:13px;
transition:.25s;
}

.buttons a:hover{
background:white;
color:black;
}

/* ===============================
   VIDEO
================================ */

iframe{
width:100%;
height:260px;
border:none;
}

/* ===============================
   RESPONSIVE
================================ */

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.logo{
width:300px;
}

}

</style>

</head>

<body>

<!-- HERO -->

<section class="hero">

<img src="./assets/logo2033.png" class="logo">

<div class="tagline">
REDUX • GUN PACKS • GTA 5 RP
</div>

<div class="hint">
НАЖМИ НА ЛОГОТИП
</div>

</section>

<!-- CREATORS -->

<div class="section-title">CREATORS</div>

<div class="grid">

<!-- CARD 1 -->

<div class="card">

<div class="creator-head">
<div class="avatar">?</div>
<div>
<div class="name">.CHKMNP</div>
<div class="role">YOUTUBE CREATOR</div>
</div>
</div>

<div class="prices">
<div>Gun Pack</div>
<div><b>1500₽+</b></div>
</
